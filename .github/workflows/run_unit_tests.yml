name: Run Unit Tests

on:
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

env:
  XCODE_VERSION: "26.5"
  IOS_VERSION: "26.5"
  SIMULATOR_NAME: "iPhone 17"
  SCHEMES: "Wikipedia WMFComponents WMFData"

concurrency:
  group: "unit-tests-${{ github.ref }}"  # One group per branch
  cancel-in-progress: true                # Cancel older runs in the same group

jobs:
  run-unit-tests:
    runs-on: macos-26
    permissions:
      actions: read
      contents: read
    strategy:
      matrix:
        scheme: ["Wikipedia", "WMFComponents", "WMFData"]

    name: Test ${{ matrix.scheme }}
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode
        run: |
          sudo xcode-select -switch "/Applications/Xcode_${XCODE_VERSION}.app"

      - name: Prepare simulator
        id: simulator
        uses: ./.github/actions/prepare-simulator
        with:
          ios-version: ${{ env.IOS_VERSION }}
          simulator-name: ${{ env.SIMULATOR_NAME }}

      - name: Ensure tests reset WMFData global environment state
        if: matrix.scheme == 'WMFData'
        run: scripts/lint-wmfdata-test-fixtures.sh

      - name: Test ${{ matrix.scheme }} scheme
        run: |
          echo "Running scheme: ${{ matrix.scheme }} on ${SIMULATOR_NAME} iOS ${IOS_VERSION} with Xcode ${XCODE_VERSION}"
          xcodebuild test \
            -scheme "${{ matrix.scheme }}" \
            -project Wikipedia.xcodeproj \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -resultBundlePath "${{ matrix.scheme }}_TestResults" \
            | xcpretty
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi

      - name: Coverage summary
        if: success()
        uses: ./.github/actions/coverage-summary
        with:
          artifact-name: ${{ matrix.scheme }}-coverage
          coverage-json-path: ${{ matrix.scheme }}_coverage.json
          result-bundle-path: ${{ matrix.scheme }}_TestResults.xcresult
          scheme: ${{ matrix.scheme }}
          workflow-file: run_unit_tests.yml
