name: Run Unit Tests

on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'
  workflow_dispatch:

env:
  XCODE_VERSION: "26.2"
  IOS_VERSION: "26.2"
  SCHEMES: "Wikipedia WMFComponents WMFData"
  SIMULATOR_NAME: "iPhone 16"

concurrency:
  group: "unit-tests-${{ github.ref }}"  # One group per branch
  cancel-in-progress: true                # Cancel older runs in the same group

jobs:
  run-unit-tests:
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
    strategy:
      matrix:
        scheme: ["Wikipedia", "WMFComponents", "WMFData"]

    name: Test ${{ matrix.scheme }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -switch "/Applications/Xcode_${XCODE_VERSION}.app"

      - name: Resolve simulator
        id: simulator
        run: |
          SIMULATOR_ID=$(python3 .github/scripts/resolve_simulator.py \
            --name "${SIMULATOR_NAME}" \
            --ios-version "${IOS_VERSION}"
          )
          echo "simulator_id=${SIMULATOR_ID}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${SIMULATOR_NAME} iOS ${IOS_VERSION} to ${SIMULATOR_ID}"

      - name: Test ${{ matrix.scheme }} scheme
        env:
          SIMULATOR_ID: ${{ steps.simulator.outputs.simulator_id }}
        run: |
          echo "Running scheme: ${{ matrix.scheme }} on ${SIMULATOR_NAME} iOS ${IOS_VERSION} (${SIMULATOR_ID}) with Xcode ${XCODE_VERSION}"
          xcodebuild test \
            -scheme "${{ matrix.scheme }}" \
            -project Wikipedia.xcodeproj \
            -destination "platform=iOS Simulator,id=${SIMULATOR_ID}" \
            -resultBundlePath "${{ matrix.scheme }}_TestResults" \
            | xcpretty
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            exit "$EXIT_CODE"
          fi

      - name: Coverage summary
        if: success()
        uses: ./.github/actions/coverage-summary
        with:
          artifact-name: ${{ matrix.scheme }}-coverage
          coverage-json-path: ${{ matrix.scheme }}_coverage.json
          result-bundle-path: ${{ matrix.scheme }}_TestResults.xcresult
          scheme: ${{ matrix.scheme }}
          workflow-file: run_unit_tests.yml
