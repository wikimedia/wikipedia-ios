name: Run Unit Tests

on:
  pull_request:
    branches:
      - 'main'
      - 'liquid-glass'
  push:
    branches:
      - 'main'
  workflow_dispatch:

env:
  XCODE_VERSION: "26.2"
  IOS_VERSION: "26.2"
  SCHEMES: "Wikipedia WMFComponents WMFData"
  
concurrency:
  group: "unit-tests-${{ github.ref }}"  # One group per branch
  cancel-in-progress: true                # Cancel older runs in the same group

jobs:
  run-unit-tests:
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
    strategy:
      matrix:
        scheme: ["Wikipedia", "WMFComponents", "WMFData"]

    name: Test ${{ matrix.scheme }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode_$XCODE_VERSION.app

      - name: Test ${{ matrix.scheme }} scheme
        run: |
          xcrun simctl list
          SIMULATORS=("iPhone 16")
          for SIMULATOR in "${SIMULATORS[@]}"; do
            echo "Running scheme: ${{ matrix.scheme }} on $SIMULATOR iOS $IOS_VERSION with Xcode $XCODE_VERSION"
            xcodebuild test \
              -scheme ${{ matrix.scheme }} \
              -project Wikipedia.xcodeproj \
              -destination "platform=iOS Simulator,name=$SIMULATOR,OS=$IOS_VERSION" \
              -resultBundlePath "${{ matrix.scheme }}_TestResults" \
              | xcpretty
            EXIT_CODE=${PIPESTATUS[0]}
            if [ $EXIT_CODE -ne 0 ]; then
              exit $EXIT_CODE
            fi
          done

      - name: Extract coverage data
        if: success()
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, sys

          result = subprocess.run(
              ["xcrun", "xccov", "view", "--report", "--json", "${{ matrix.scheme }}_TestResults.xcresult"],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print("xccov failed:", result.stderr, file=sys.stderr)
              sys.exit(result.returncode)

          report = json.loads(result.stdout)

          current = {}
          for target in report.get("targets", []):
              name = target["name"]
              if name.endswith(".xctest") or name.endswith("Tests"):
                  continue
              pct = target.get("lineCoverage", 0) * 100
              current[name] = round(pct, 2)

          with open("${{ matrix.scheme }}_coverage.json", "w") as f:
              json.dump({"${{ matrix.scheme }}": current}, f)
          PYEOF

      - name: Download main coverage data
        if: success() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow run_unit_tests.yml \
            --branch main \
            --event push \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')

          if [ -z "$RUN_ID" ]; then
            echo "No successful main coverage run found."
            exit 0
          fi

          mkdir -p main-coverage
          gh run download "$RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "${{ matrix.scheme }}-coverage" \
            --dir main-coverage || echo "No main coverage artifact found for ${{ matrix.scheme }} in run $RUN_ID."

      - name: Coverage summary
        if: success()
        run: |
          python3 - <<'PYEOF'
          import json, os

          scheme = "${{ matrix.scheme }}"
          with open(f"{scheme}_coverage.json") as f:
              current = json.load(f).get(scheme, {})

          baseline = {}
          baseline_path = f"main-coverage/{scheme}_coverage.json"
          if os.path.exists(baseline_path):
              with open(baseline_path) as f:
                  baseline = json.load(f).get(scheme, {})

          lines = []
          lines.append("### ${{ matrix.scheme }} Code Coverage")
          lines.append("")
          lines.append("| Target | Coverage | Delta |")
          lines.append("|--------|----------|-------|")
          for name, pct in current.items():
              prev = baseline.get(name)
              if prev is not None:
                  delta = pct - prev
                  sign = "+" if delta >= 0 else ""
                  delta_str = f"{sign}{delta:.1f}%"
              else:
                  delta_str = "—"
              lines.append(f"| {name} | {pct:.1f}% | {delta_str} |")
          lines.append("")

          md = "\n".join(lines)
          print(md)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(md + "\n")
          PYEOF

      - name: Upload coverage data
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scheme }}-coverage
          path: ${{ matrix.scheme }}_coverage.json
          if-no-files-found: error
